name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      # Stage only the app file so the published site stays clean
      # (no README, .gitignore, or workflow files served).
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npx --yes netlify-cli@latest deploy \
            --prod \
            --dir _site \
            --site "${{ secrets.NETLIFY_SITE_ID }}" \
            --message "CI deploy: ${{ github.sha }}"
